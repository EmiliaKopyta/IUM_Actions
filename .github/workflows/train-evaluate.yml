name: Train and evaluate total spend model

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of training epochs"
        required: true
        default: "10"
      batch_size:
        description: "Training batch size"
        required: true
        default: "32"
      test_size:
        description: "Test set size"
        required: true
        default: "0.2"
      validation_split:
        description: "Validation split during training"
        required: true
        default: "0.2"
      data_url:
        description: "Optional public URL to CSV dataset. Leave empty if dataset is in repo."
        required: false
        default: ""

jobs:
  train:
    name: Train model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare training data
        run: |
          if [ -n "${{ github.event.inputs.data_url }}" ]; then
            wget -O starbucks_customer_ordering_patterns.csv "${{ github.event.inputs.data_url }}"
          else
            echo "Using dataset already committed to repository"
            ls -lah
          fi

      - name: Train model
        env:
          EPOCHS: ${{ github.event.inputs.epochs }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          TEST_SIZE: ${{ github.event.inputs.test_size }}
          VALIDATION_SPLIT: ${{ github.event.inputs.validation_split }}
          DATA_PATH: starbucks_customer_ordering_patterns.csv
        run: |
          python train_predict_total_spend.py

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: revenue-artifacts
          path: revenue_artifacts/

  evaluate:
    name: Evaluate model
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: revenue-artifacts
          path: revenue_artifacts/

      - name: Evaluate model
        run: |
          python predict_total_spend.py

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts
          path: |
            revenue_artifacts/test_predictions.csv
            revenue_artifacts/evaluation_summary.txt
